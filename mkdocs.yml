site_name: segkv
site_description: A log-structured key-value store for Python
site_author: Nana Adjei Manu
site_url: https://janettai.github.io/segkv/
repo_url: https://github.com/janettai/segkv
repo_name: janettai/segkv

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - toc.integrate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - API Reference:
      - LSDB: api/lsdb.md
      - MemoryStore: api/memory-store.md
      - Migration Utilities: api/migration.md
  - CLI Reference: cli.md
  - Claude Integration: claude-integration.md
  - Configuration: configuration.md
  - Changelog: changelog.md
